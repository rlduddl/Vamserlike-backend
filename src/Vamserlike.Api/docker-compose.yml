version: '3.9'

services:      
  appgw:
    restart: always    
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5202  # 이 환경변수가 핵심!
    ports:
      - "5202:5202"
    networks:
      - appnetwork
    extra_hosts:
      - "host.docker.internal:host-gateway"
      
networks:
  appnetwork:
    driver: bridge
